<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CORE Iris</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="hdr">
    <div class="logo">
      <img src="icons/icon-48.png" alt="" width="28" height="28" />
      <div>
        <div class="brand">CORE Iris</div>
        <div class="tag">あなた専属のマネージャー AI</div>
      </div>
    </div>
    <a class="open" id="openApp" href="#" target="_blank" rel="noopener">アプリを開く →</a>
  </header>

  <section class="card" id="capCard">
    <div class="ctx" id="ctxBadge">
      <span class="dot"></span>
      <span id="ctxLabel">読み込み中…</span>
    </div>

    <div class="row">
      <div class="label">いまのページ</div>
      <div class="title" id="pageTitle">読み込み中…</div>
      <div class="url" id="pageUrl"></div>
    </div>

    <div class="actions">
      <button class="btn primary" id="dmBtn">
        DM スクショから案件に変える
      </button>
      <button class="btn ghost" id="profileBtn">
        プロフィールを Iris に取り込む
      </button>
      <button class="btn ghost" id="saveBtn">
        いまのページをメモする
      </button>
    </div>
    <div class="status" id="status" hidden></div>
  </section>

  <section class="card mini">
    <div class="mini-row">
      <span class="kbd">Alt</span>+<span class="kbd">I</span>
      <span class="mini-text">でいつでも開きます</span>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
