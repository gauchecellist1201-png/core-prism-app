    <style>
      html, body {
        margin: 0; padding: 0;
        background: linear-gradient(135deg, #0A0A14 0%, #1a0f2e 50%, #2e1456 100%);

        max-width: 480px; text-align: center;

  <body>
    <main class="card">
      <p class="eyebrow">CORE PRISM × INVITATION</p>
      <h1>友達から招待されました<br/>+7 日 無料延長つき</h1>
      <p class="sub">
        通常 3 日 → 合計 <strong>10 日間</strong> 無料でお試しできます。<br/>
        AI が事業を回す、すべての事業家の OS。
      </p>
      <a id="cta" class="cta" href="/">登録して受け取る →</a>
      <p class="small">クレジットカード不要 · いつでも解約可</p>
    </main>
    <script>
      // ?ref=CODE&from=NAME&msg=... を引き継いで / に遷移
      // (短時間 SNS の OG プレビュー後、人間が踏むと自動で本体へ)
      // from / msg を落とすと「○○ さんからの招待」+ 一言メッセージが消えるので必ず引き継ぐ
      (function () {
        try {
          var url = new URL(window.location.href);
          var ref = url.searchParams.get('ref');
          var from = url.searchParams.get('from');
          var msg = url.searchParams.get('msg');
          var qs = [];
          if (ref) qs.push('ref=' + encodeURIComponent(ref));
          if (from) qs.push('from=' + encodeURIComponent(from));
          if (msg) qs.push('msg=' + encodeURIComponent(msg));
          var target = '/' + (qs.length ? '?' + qs.join('&') : '');
          var a = document.getElementById('cta');
          if (a) a.setAttribute('href', target);
          // 自動遷移は 1.2 秒後 (SNS Bot は JS を実行しないので OG プレビューは維持される)
          setTimeout(function () { window.location.replace(target); }, 1200);
        } catch (e) { /* */ }
      })();
    </script>
  </body>
